# ===============================
# Computer Shop Backend Configuration
# ===============================

spring:
  application:
    name: computer-shop-backend
  
  # ===============================
  # Database Configuration
  # ===============================
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://huuhieudb.postgres.database.azure.com/pc_shop_database_2}
    username: ${SPRING_DATASOURCE_USERNAME:huuhieu56}
    password: ${SPRING_DATASOURCE_PASSWORD:Abc1234@}
    driver-class-name: org.postgresql.Driver
    
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:5}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:300000}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:20000}
  
  # ===============================
  # JPA / Hibernate Configuration
  # ===============================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # ===============================
  # Jackson Configuration
  # ===============================
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    time-zone: ${APP_TIMEZONE:Asia/Ho_Chi_Minh}
  
  # ===============================
  # File Upload Configuration
  # ===============================
  servlet:
    multipart:
      max-file-size: ${APP_FILE_MAX_SIZE:10MB}
      max-request-size: ${APP_FILE_MAX_REQUEST_SIZE:10MB}

# ===============================
# Server Configuration
# ===============================
server:
  port: ${SERVER_PORT:8080}

# ===============================
# App Custom Configurations
# ===============================
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}

  file-storage:
    location: ${APP_FILE_STORAGE_LOCATION:images}
  
  inventory:
    default-low-stock-threshold: ${APP_DEFAULT_LOW_STOCK_THRESHOLD:10}

# ===============================
# Logging Configuration
# ===============================
logging:
  level:
    com.computershop: ${LOGGING_LEVEL_COMPUTERSHOP:DEBUG}
    org.hibernate.SQL: ${LOGGING_LEVEL_HIBERNATE_SQL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOGGING_LEVEL_BINDER:TRACE}
